services:
- type: web
  name: footruck-apollo-backend
  runtime: python
  rootDir: backend
  buildCommand: pip install -r requirements.txt
  startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
  envVars:
  - key: PYTHON_VERSION
    value: 3.11.9
  - key: SQLITE_PATH
    value: /var/data/footruck_apollo.sqlite3
  - key: DB_NAME
    value: foodtruck_production
  - key: JWT_SECRET
    sync: false
  - key: STRIPE_API_KEY
    sync: false
  - key: STRIPE_WEBHOOK_SECRET
    sync: false
  - key: CORS_ORIGINS
    sync: false
  - key: COOKIE_SECURE
    value: "true"
  healthCheckPath: /api/
  disk:
    name: footruck-apollo-data
    mountPath: /var/data
    sizeGB: 5
- type: web
  name: footruck-apollo-frontend
  runtime: static
  rootDir: frontend
  buildCommand: npm install --legacy-peer-deps && npm run build
  staticPublishPath: build
  routes:
  - type: rewrite
    source: /*
    destination: /index.html
  envVars:
  - key: VITE_BACKEND_URL
    sync: false
