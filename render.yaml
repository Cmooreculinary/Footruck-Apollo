services:
  - type: web
    name: footruck-apollo-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: footruck-apollo
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FOODTRUCK_STANDARD_PRICE_ID
        sync: false
      - key: FOODTRUCK_PRO_PRICE_ID
        sync: false

  - type: web
    name: footruck-apollo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
