<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141210"/>
      <stop offset="100%" style="stop-color:#1a1714"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2e2820" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3"/>
  
  <!-- Truck Icon -->
  <g transform="translate(80, 180)">
    <rect x="0" y="40" width="120" height="80" rx="8" fill="#ec7f13"/>
    <rect x="100" y="60" width="50" height="60" rx="4" fill="#ec7f13"/>
    <circle cx="40" cy="130" r="20" fill="#2e2820"/>
    <circle cx="40" cy="130" r="12" fill="#141210"/>
    <circle cx="120" cy="130" r="20" fill="#2e2820"/>
    <circle cx="120" cy="130" r="12" fill="#141210"/>
    <rect x="15" y="55" width="70" height="30" rx="4" fill="#141210" opacity="0.3"/>
  </g>
  
  <!-- Brand Text -->
  <text x="240" y="230" font-family="Space Grotesk, sans-serif" font-size="18" fill="#ec7f13" font-weight="700" letter-spacing="4">BLUE COLLAR APPS CO.</text>
  
  <!-- Main Title -->
  <text x="240" y="300" font-family="Oswald, sans-serif" font-size="72" fill="white" font-weight="700" letter-spacing="2">FOOD TRUCK</text>
  <text x="240" y="380" font-family="Oswald, sans-serif" font-size="72" fill="white" font-weight="700" letter-spacing="2">LAUNCH PAD</text>
  
  <!-- Tagline -->
  <text x="240" y="440" font-family="Space Grotesk, sans-serif" font-size="24" fill="#9ca3af">From concept to Day One. Industrial-grade precision.</text>
  
  <!-- Badges -->
  <g transform="translate(240, 480)">
    <rect x="0" y="0" width="120" height="36" rx="18" fill="#ec7f13" fill-opacity="0.2" stroke="#ec7f13" stroke-opacity="0.4"/>
    <text x="60" y="24" font-family="Space Grotesk, sans-serif" font-size="12" fill="#ec7f13" font-weight="700" text-anchor="middle" letter-spacing="2">11 SCREENS</text>
    
    <rect x="140" y="0" width="100" height="36" rx="18" fill="#1f2937" stroke="#374151"/>
    <text x="190" y="24" font-family="Space Grotesk, sans-serif" font-size="12" fill="#9ca3af" font-weight="700" text-anchor="middle" letter-spacing="2">7 PHASES</text>
    
    <rect x="260" y="0" width="160" height="36" rx="18" fill="#1f2937" stroke="#374151"/>
    <text x="340" y="24" font-family="Space Grotesk, sans-serif" font-size="12" fill="#9ca3af" font-weight="700" text-anchor="middle" letter-spacing="2">PRODUCTION READY</text>
  </g>
  
  <!-- Feature Icons Grid -->
  <g transform="translate(800, 160)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="80" height="80" rx="12" fill="#1a1714" stroke="#2e2820"/>
    <text x="40" y="50" font-size="32" text-anchor="middle" fill="#ec7f13">⏱️</text>
    
    <rect x="100" y="0" width="80" height="80" rx="12" fill="#1a1714" stroke="#2e2820"/>
    <text x="140" y="50" font-size="32" text-anchor="middle" fill="#ec7f13">🍳</text>
    
    <rect x="200" y="0" width="80" height="80" rx="12" fill="#1a1714" stroke="#2e2820"/>
    <text x="240" y="50" font-size="32" text-anchor="middle" fill="#ec7f13">📚</text>
    
    <!-- Row 2 -->
    <rect x="0" y="100" width="80" height="80" rx="12" fill="#1a1714" stroke="#2e2820"/>
    <text x="40" y="150" font-size="32" text-anchor="middle" fill="#ec7f13">🎨</text>
    
    <rect x="100" y="100" width="80" height="80" rx="12" fill="#1a1714" stroke="#2e2820"/>
    <text x="140" y="150" font-size="32" text-anchor="middle" fill="#ec7f13">💵</text>
    
    <rect x="200" y="100" width="80" height="80" rx="12" fill="#1a1714" stroke="#2e2820"/>
    <text x="240" y="150" font-size="32" text-anchor="middle" fill="#ec7f13">📊</text>
    
    <!-- Row 3 -->
    <rect x="0" y="200" width="80" height="80" rx="12" fill="#1a1714" stroke="#2e2820"/>
    <text x="40" y="250" font-size="32" text-anchor="middle" fill="#ec7f13">📋</text>
    
    <rect x="100" y="200" width="80" height="80" rx="12" fill="#1a1714" stroke="#2e2820"/>
    <text x="140" y="250" font-size="32" text-anchor="middle" fill="#ec7f13">🧮</text>
    
    <rect x="200" y="200" width="80" height="80" rx="12" fill="#1a1714" stroke="#2e2820"/>
    <text x="240" y="250" font-size="32" text-anchor="middle" fill="#ec7f13">👥</text>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="#ec7f13"/>
</svg>