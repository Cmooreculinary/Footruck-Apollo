<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Oswald:wght@700&display=swap');
body {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #141210 0%, #1a1714 100%);
  font-family: 'Space Grotesk', sans-serif;
  color: white;
  display: flex;
  overflow: hidden;
}
.left {
  flex: 1;
  padding: 60px 80px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.brand {
  color: #ec7f13;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 4px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.truck-icon {
  width: 32px;
  height: 32px;
}
h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 80px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: 2px;
  margin-bottom: 24px;
}
.tagline {
  font-size: 22px;
  color: #9ca3af;
  margin-bottom: 40px;
}
.badges {
  display: flex;
  gap: 12px;
}
.badge {
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
}
.badge.primary {
  background: rgba(236, 127, 19, 0.2);
  border: 1px solid rgba(236, 127, 19, 0.4);
  color: #ec7f13;
}
.badge.secondary {
  background: #1f2937;
  border: 1px solid #374151;
  color: #9ca3af;
}
.right {
  width: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding-right: 60px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, 90px);
  gap: 16px;
}
.card {
  width: 90px;
  height: 90px;
  background: #1a1714;
  border: 1px solid #2e2820;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card svg {
  width: 36px;
  height: 36px;
  color: #ec7f13;
}
.accent-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: #ec7f13;
}
</style>
</head>
<body>
<div class="left">
  <div class="brand">
    <svg class="truck-icon" viewBox="0 0 24 24" fill="none" stroke="#ec7f13" stroke-width="2">
      <rect x="1" y="3" width="15" height="13" rx="2"/>
      <path d="M16 8h4l3 3v5h-7V8z"/>
      <circle cx="5.5" cy="18.5" r="2.5"/>
      <circle cx="18.5" cy="18.5" r="2.5"/>
    </svg>
    BLUE COLLAR APPS CO.
  </div>
  <h1>FOOD TRUCK<br/>LAUNCH PAD</h1>
  <p class="tagline">From concept to Day One. Industrial-grade precision.</p>
  <div class="badges">
    <span class="badge primary">11 SCREENS</span>
    <span class="badge secondary">7 PHASES</span>
    <span class="badge secondary">PRODUCTION READY</span>
  </div>
</div>
<div class="right">
  <div class="grid">
    <div class="card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
    <div class="card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <div class="card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19h16M4 15h16M4 11h16M4 7h16"/></svg></div>
    <div class="card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r="2.5"/><circle cx="19" cy="16" r="2"/><circle cx="5" cy="18" r="2"/><path d="M6.5 12c.5-2 2-3.5 4-4"/></svg></div>
    <div class="card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
    <div class="card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div>
    <div class="card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg></div>
    <div class="card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M9 9h6v6H9z"/><path d="M9 1v3M15 1v3M9 20v3M15 20v3M20 9h3M20 14h3M1 9h3M1 14h3"/></svg></div>
    <div class="card"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
  </div>
</div>
<div class="accent-bar"></div>
</body>
</html>
